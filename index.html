<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建設業評価システム</title>
    <meta name="description" content="建設業向け従業員評価管理システム">
    
    <!-- CSS読み込み -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
</head>
<body>
    <!-- ローディングインジケーター -->
    <div id="loading-indicator" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">読み込み中...</div>
    </div>

    <!-- メインアプリケーション -->
    <div id="app" class="app-container">
        <!-- ナビゲーションヘッダー -->
        <header id="app-header" class="app-header">
            <div class="header-content">
                <div class="logo">
                    <h1>建設業評価システム</h1>
                </div>
                <nav id="main-navigation" class="main-navigation">
                    <!-- ナビゲーションメニューは動的に生成 -->
                </nav>
                <div class="user-menu">
                    <div class="user-info" id="user-info">
                        <!-- ユーザー情報は動的に生成 -->
                    </div>
                </div>
            </div>
        </header>

        <!-- ブレッドクラム -->
        <div id="breadcrumbs" class="breadcrumbs">
            <!-- ブレッドクラムは動的に生成 -->
        </div>

        <!-- メインコンテンツ -->
        <main id="main-content" class="main-content">
            <!-- ページコンテンツは動的に生成 -->
            <div class="welcome-screen">
                <h2>建設業評価システムへようこそ</h2>
                <p>システムを初期化しています...</p>
            </div>
        </main>

        <!-- フッター -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>&copy; 2025 建設業評価システム. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- JavaScript読み込み（依存関係順に読み込み） -->
    
    <!-- 1. ユーティリティと定数 -->
    <script src="assets/js/utils/constants.js"></script>
    
    <!-- 2. データ -->
    <script src="assets/js/data/mock-data.js"></script>
    
    <!-- 3. コア機能 -->
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/api.js"></script>
    
    <!-- 4. コンポーネント -->
    <script src="assets/js/components/notification.js"></script>
    <script src="assets/js/components/navigation.js"></script>
    <script src="assets/js/components/evaluation-form.js"></script>
    
    <!-- 5. ページコントローラー -->
    <script src="assets/js/pages/dashboard.js"></script>
    <script src="assets/js/pages/evaluations.js"></script>
    <script src="assets/js/pages/users.js"></script>
    
    <!-- 6. ルーター -->
    <script src="assets/js/core/router.js"></script>
    
    <!-- 7. メインアプリケーション（最後に読み込み） -->
    <script src="assets/js/core/app.js"></script>

    <!-- アプリケーション初期化 -->
    <script>
        // グローバルエラーハンドリング
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            console.error('Error at:', e.filename, 'line:', e.lineno, 'col:', e.colno);
            
            // エラー表示
            const mainContent = document.getElementById('main-content');
            if (mainContent) {
                mainContent.innerHTML = `
                    <div class="error-page">
                        <h2>❌ アプリケーションエラー</h2>
                        <p><strong>エラー:</strong> ${e.error?.message || ' 不明なエラー'}</p>
                        <p><strong>ファイル:</strong> ${e.filename || '不明'}</p>
                        <p><strong>行:</strong> ${e.lineno || '?'}</p>
                        <button onclick="location.reload()" class="btn-primary">再読み込み</button>
                    </div>
                `;
            }
        });

        window.addEventListener('unhandledrejection', function(e) {
            console.error('Unhandled promise rejection:', e.reason);
        });

        // DOMContentLoaded後にアプリを初期化
        document.addEventListener('DOMContentLoaded', function() {
            try {
                console.log('DOM loaded, checking dependencies...');
                
                // 必要なオブジェクトの存在確認
                const requiredObjects = [
                    'window.AuthManager',
                    'window.ApiClient', 
                    'window.notification',
                    'window.navigation',
                    'window.dashboard',
                    'window.evaluations',
                    'window.users',
                    'window.router'
                ];
                
                const missingObjects = [];
                
                requiredObjects.forEach(objPath => {
                    const keys = objPath.split('.');
                    let current = window;
                    for (let i = 1; i < keys.length; i++) {
                        if (!current[keys[i]]) {
                            missingObjects.push(objPath);
                            break;
                        }
                        current = current[keys[i]];
                    }
                });
                
                if (missingObjects.length > 0) {
                    throw new Error(`Missing required objects: ${missingObjects.join(', ')}`);
                }
                
                console.log('All dependencies loaded successfully');
                
                // アプリケーション初期化
                if (typeof window.App !== 'undefined') {
                    console.log('Initializing main app...');
                    window.app = new window.App();
                    console.log('App initialized successfully');
                } else {
                    throw new Error('App class not found. Check if app.js is loaded correctly.');
                }
                
            } catch (error) {
                console.error('App initialization failed:', error);
                
                // ローディングを隠す
                const loadingIndicator = document.getElementById('loading-indicator');
                if (loadingIndicator) {
                    loadingIndicator.style.display = 'none';
                }
                
                // エラー表示
                const mainContent = document.getElementById('main-content');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <div class="error-page">
                            <h2>🚨 初期化エラー</h2>
                            <p><strong>問題:</strong> ${error.message}</p>
                            <div class="error-details">
                                <h3>確認事項:</h3>
                                <ul>
                                    <li>すべてのJavaScriptファイルが正しく配置されているか</li>
                                    <li>ファイル名が正確か（大文字小文字含む）</li>
                                    <li>ネットワーク接続に問題がないか</li>
                                </ul>
                            </div>
                            <div class="error-actions">
                                <button onclick="location.reload()" class="btn-primary">再読み込み</button>
                                <button onclick="window.open('debug.html', '_blank')" class="btn-secondary">ファイルチェック</button>
                            </div>
                        </div>
                    `;
                }
            }
        });
        
        // デバッグ情報表示（開発用）
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '') {
            console.log('🔧 Development mode enabled');
            window.DEBUG_MODE = true;
            
            // 5秒後にデバッグ情報を表示
            setTimeout(() => {
                console.log('📊 Debug Info:', {
                    auth: typeof window.AuthManager,
                    api: typeof window.ApiClient,
                    notification: typeof window.notification,
                    navigation: typeof window.navigation,
                    router: typeof window.router,
                    app: typeof window.app
                });
            }, 5000);
        }
    </script>
</body>
</html>
