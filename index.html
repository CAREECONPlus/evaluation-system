<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>評価ツール</title>
  <meta name="description" content="建設業向け従業員評価管理システム">
  <meta name="author" content="Your Company Name">
  
  <!-- External CSS Dependencies -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
</head>
<body>
  <!-- ローディング画面 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="d-flex flex-column align-items-center">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">読み込み中...</span>
      </div>
      <p class="mt-3">評価ツールを起動しています...</p>
    </div>
  </div>

  <!-- デモモード通知 -->
  <div id="demo-badge" class="demo-badge">デモモード</div>

  <!-- メインナビゲーション -->
  <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <!-- ナビゲーション内容は navigation.js で動的に生成 -->
  </nav>

  <!-- メインコンテナ -->
  <div class="container-fluid">
    <!-- アプリケーションコンテンツ -->
    <div id="app-content" class="mt-4">
      <!-- ページコンテンツは動的に読み込まれます -->
    </div>
  </div>

  <!-- モーダルコンテナ -->
  <div id="modal-container">
    <!-- モーダルは動的に読み込まれます -->
  </div>

  <!-- 通知システム -->
  <div id="notification-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1055">
    <!-- 通知トーストは動的に生成されます -->
  </div>

  <!-- エラー表示モーダル -->
  <div class="modal fade" id="error-modal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="errorModalLabel">
            <i class="fas fa-exclamation-triangle me-2"></i>エラー
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="error-message">予期しないエラーが発生しました。</p>
          <details class="mt-3">
            <summary>技術的な詳細</summary>
            <pre id="error-details" class="mt-2 p-2 bg-light border rounded small"></pre>
          </details>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
          <button type="button" class="btn btn-primary" id="reload-app-btn">
            <i class="fas fa-redo me-1"></i>アプリを再読み込み
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- External JavaScript Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Core Application Scripts -->
  <script src="assets/js/utils/constants.js"></script>
  <script src="assets/js/utils/helpers.js"></script>
  <script src="assets/js/utils/validation.js"></script>
  
  <!-- Data Layer -->
  <script src="assets/js/data/mock-data.js"></script>
  <script src="assets/js/data/evaluation-criteria.js"></script>
  
  <!-- Core Classes -->
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/core/router.js"></script>
  
  <!-- Components -->
  <script src="assets/js/components/notification.js"></script>
  <script src="assets/js/components/modal.js"></script>
  <script src="assets/js/components/navigation.js"></script>
  <script src="assets/js/components/chart.js"></script>
  <script src="assets/js/components/evaluation-form.js"></script>
  
  <!-- Page Controllers -->
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/evaluations.js"></script>
  <script src="assets/js/pages/subordinates.js"></script>
  <script src="assets/js/pages/users.js"></script>
  <script src="assets/js/pages/settings.js"></script>
  <script src="assets/js/pages/reports.js"></script>
  
  <!-- Main Application -->
  <script src="assets/js/core/app.js"></script>

  <!-- Application Initialization -->
  <script>
    // グローバルエラーハンドリング
    window.addEventListener('error', function(event) {
      console.error('Global error:', event.error);
      EvaluationApp.ErrorHandler.showError(
        'アプリケーションエラー', 
        event.error?.message || 'スクリプトの実行中にエラーが発生しました',
        event.error?.stack
      );
    });

    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled promise rejection:', event.reason);
      EvaluationApp.ErrorHandler.showError(
        'Promise エラー',
        event.reason?.message || 'Promise の処理中にエラーが発生しました',
        event.reason?.stack
      );
    });

    // アプリケーション初期化
    document.addEventListener('DOMContentLoaded', function() {
      try {
        // 依存関係の確認
        if (typeof bootstrap === 'undefined') {
          throw new Error('Bootstrap が読み込まれていません');
        }
        
        if (typeof Chart === 'undefined') {
          throw new Error('Chart.js が読み込まれていません');
        }

        // メインアプリケーションの初期化
        if (typeof EvaluationApp !== 'undefined' && EvaluationApp.App) {
          const app = new EvaluationApp.App();
          
          // グローバル参照を設定（デバッグ用）
          window.evaluationApp = app;
          
          // アプリケーション開始
          app.initialize();
          
          console.log('評価ツールが正常に初期化されました');
        } else {
          throw new Error('EvaluationApp.App クラスが見つかりません');
        }
        
      } catch (error) {
        console.error('アプリケーション初期化エラー:', error);
        
        // ローディング画面を非表示
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) {
          loadingOverlay.style.display = 'none';
        }
        
        // エラーモーダルを表示
        EvaluationApp.ErrorHandler.showError(
          'アプリケーション初期化エラー',
          error.message || 'アプリケーションの初期化に失敗しました',
          error.stack
        );
      }
    });

    // アプリ再読み込みボタンのイベントリスナー
    document.addEventListener('DOMContentLoaded', function() {
      const reloadBtn = document.getElementById('reload-app-btn');
      if (reloadBtn) {
        reloadBtn.addEventListener('click', function() {
          window.location.reload();
        });
      }
    });

    // デバッグモード設定（開発用）
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      window.DEBUG_MODE = true;
      console.log('デバッグモードが有効です');
    }

    // Service Worker 登録（PWA対応、将来的に）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('Service Worker registered: ', registration);
          })
          .catch(function(registrationError) {
            console.log('Service Worker registration failed: ', registrationError);
          });
      });
    }
  </script>

  <!-- Google Analytics（本番環境用） -->

</body>
</html>
