<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="system.title">建設業評価システム</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー（ログイン時のみ表示） -->
        <header id="app-header" class="app-header" style="display: none;">
            <div class="header-content">
                <div class="logo">
                    <h1 id="header-title" data-i18n="system.title">🏗️ 建設業評価システム</h1>
                </div>
                <nav>
                    <ul class="nav-menu" id="nav-menu"></ul>
                </nav>
                <div class="user-menu">
                    <div class="user-info" id="user-info"></div>
                    <div class="language-selector">
                        <select id="header-language-select">
                            <option value="ja">🇯🇵 日本語</option>
                            <option value="vi">🇻🇳 Tiếng Việt</option>
                            <option value="en">🇺🇸 English</option>
                        </select>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary" style="margin-left: 12px;">
                        <span data-i18n="nav.logout">ログアウト</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- ブレッドクラム -->
        <div id="breadcrumbs" class="breadcrumbs" style="display: none;"></div>

        <!-- メインコンテンツ -->
        <main id="main-content" class="main-content">
            <!-- 初期状態：ログインページ -->
            <div class="login-page">
                <div class="login-container">
                    <div class="login-header">
                        <h1 data-i18n="system.title">🏗️ 建設業評価システム</h1>
                        <p data-i18n="system.subtitle">システムにログインしてください</p>
                        <div style="margin-top: 16px;">
                            <select id="login-language-select" style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                                <option value="ja">🇯🇵 日本語</option>
                                <option value="vi">🇻🇳 Tiếng Việt</option>
                                <option value="en">🇺🇸 English</option>
                            </select>
                        </div>
                    </div>

                    <form id="login-form">
                        <div class="form-group">
                            <label for="email" data-i18n="login.email">メールアドレス</label>
                            <input type="email" id="email" name="email" value="admin@company.com" required>
                        </div>

                        <div class="form-group">
                            <label for="password" data-i18n="login.password">パスワード</label>
                            <input type="password" id="password" name="password" value="password123" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="login.submit">
                            ログイン
                        </button>
                    </form>

                    <div class="demo-info">
                        <strong data-i18n="login.demo">🚀 デモアカウント</strong>
                        <div class="demo-accounts">
                            <div class="demo-account">
                                <strong>管理者:</strong> admin@company.com / password123
                            </div>
                            <div class="demo-account">
                                <strong>マネージャー:</strong> manager@company.com / password123
                            </div>
                            <div class="demo-account">
                                <strong>主任:</strong> supervisor@company.com / password123
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- フッター -->
        <footer class="app-footer" style="background: #f8f9fa; text-align: center; padding: 20px; border-top: 1px solid #e0e0e0;">
            <p>&copy; 2025 建設業評価システム. All rights reserved.</p>
        </footer>
    </div>

    <!-- 通知コンテナ -->
    <div id="notification-container"></div>

    <!-- JavaScript Files -->
    <!-- Core -->
    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/core/auth.js"></script>
    <script src="assets/js/core/app.js"></script>
    <script src="assets/js/core/router.js"></script>

    <!-- Components -->
    <script src="assets/js/components/pentagon-chart.js"></script>
    <script src="assets/js/components/notification.js"></script>
    <script src="assets/js/components/modal.js"></script>
    <script src="assets/js/components/evaluation-form.js"></script>

    <!-- Pages -->
    <script src="assets/js/pages/dashboard.js"></script>
    <script src="assets/js/pages/evaluations.js"></script>
    <script src="assets/js/pages/users.js"></script>

    <!-- Data -->
    <script src="assets/js/data/mock-data.js"></script>

    <!-- Utils -->
    <script src="assets/js/utils/constants.js"></script>

    <!-- 初期化スクリプト -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Building evaluation system started');
            
            // 多言語システムを初期化
            i18n.init();
            
            // アプリケーションを初期化
            if (typeof App !== 'undefined') {
                window.app = new App();
                app.init();
            }
            
            // 言語切り替えイベントリスナーを設定
            const loginLanguageSelect = document.getElementById('login-language-select');
            const headerLanguageSelect = document.getElementById('header-language-select');
            
            loginLanguageSelect.addEventListener('change', function() {
                i18n.setLanguage(this.value);
                headerLanguageSelect.value = this.value;
            });
            
            headerLanguageSelect.addEventListener('change', function() {
                i18n.setLanguage(this.value);
                loginLanguageSelect.value = this.value;
            });
            
            console.log('✅ Evaluation system initialized');
        });
    </script>
</body>
</html>
